{% extends 'dashboard/base.html' %}

{% block content %}

<h1>🚀 My Projects</h1>

{% for project in projects %}

<div class="card">

    <h2>{{ project.title }}</h2>

    <p>{{ project.description }}</p>

    <p>
        <strong>Tech Stack:</strong>
        {{ project.tech_stack }}
    </p>

</div>

{% empty %}

<div class="card">
    <h2>No Projects Added Yet</h2>
</div>

{% endfor %}

{% endblock %}
